<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GIF Maker Pro ✦ Animated GIF Creator</title>

    <style>
        :root {
            --bg: #f0f2f8;
            --card-bg: #ffffff;
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --primary-dark: #5541d7;
            --accent: #ff6b6b;
            --accent-light: #ff8e8e;
            --success: #00b894;
            --success-light: #55efc4;
            --text: #2d3436;
            --text-light: #636e72;
            --text-lighter: #b2bec3;
            --border: #e0e3eb;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.15);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(160deg, #e8ecf8 0%, #f0f2f8 30%, #fdf2f8 70%, #f0f2f8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.3;
            z-index: -1;
            pointer-events: none;
            animation: orbFloat 20s ease-in-out infinite;
        }
        body::before {
            width: 400px;
            height: 400px;
            background: #a29bfe;
            top: -100px;
            left: -120px;
        }
        body::after {
            width: 360px;
            height: 360px;
            background: #fd79a8;
            bottom: -80px;
            right: -100px;
            animation-delay: -10s;
        }
        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(50px, -40px) scale(1.08);
            }
            50% {
                transform: translate(-25px, 25px) scale(0.93);
            }
            75% {
                transform: translate(-40px, -20px) scale(1.06);
            }
        }

        .app-container {
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-bottom: 45px;
        }

        .header {
            text-align: center;
            padding: 10px 0 4px;
        }
        .header .logo-icon {
            display: inline-block;
            font-size: 48px;
            margin-bottom: 2px;
            animation: bounceIcon 2.2s ease-in-out infinite;
        }
        @keyframes bounceIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-16px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-7px);
            }
            85% {
                transform: translateY(0);
            }
        }
        .header h1 {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 500;
            margin-top: -2px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: clamp(18px, 3.5vw, 28px);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .card-header .icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .icon-upload {
            background: #ede7f6;
            color: #6c5ce7;
        }
        .icon-frames {
            background: #fff3e0;
            color: #f39c12;
        }
        .icon-settings {
            background: #e8f5e9;
            color: #00b894;
        }
        .icon-preview {
            background: #fce4ec;
            color: #e91e63;
        }
        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }
        .card-header .badge {
            margin-left: auto;
            background: #f1f3f6;
            color: var(--text-light);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .upload-zone {
            border: 2.5px dashed #d0d5e0;
            border-radius: var(--radius);
            padding: clamp(32px, 6vw, 48px) 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: #fafbfd;
            position: relative;
            user-select: none;
        }
        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--primary);
            background: #f5f3ff;
            box-shadow: 0 0 0 10px rgba(108, 92, 231, 0.07);
            transform: translateY(-2px);
        }
        .upload-zone.drag-over {
            border-color: var(--primary-dark);
            background: #ede9ff;
            box-shadow: 0 0 0 16px rgba(108, 92, 231, 0.10);
        }
        .upload-zone .upload-icon {
            font-size: 52px;
            margin-bottom: 10px;
            display: block;
            transition: transform var(--transition);
        }
        .upload-zone:hover .upload-icon {
            transform: scale(1.08);
        }
        .upload-zone .upload-text {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 6px;
        }
        .upload-zone .upload-hint {
            font-size: 0.85rem;
            color: var(--text-lighter);
            margin: 0;
        }
        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .frame-list-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 2px 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #d0d5e0 transparent;
            min-height: 90px;
            align-items: center;
            flex-wrap: nowrap;
        }
        .frame-list-container::-webkit-scrollbar {
            height: 5px;
        }
        .frame-list-container::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }
        .frame-list-container::-webkit-scrollbar-thumb {
            background: #d0d5e0;
            border-radius: 10px;
        }
        .frame-item {
            flex-shrink: 0;
            position: relative;
            width: 76px;
            height: 76px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            background: #f5f6fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .frame-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .frame-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 6px rgba(108, 92, 231, 0.18);
            transform: scale(1.06);
            z-index: 2;
        }
        .frame-item .frame-number {
            position: absolute;
            top: 4px;
            left: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 0.68rem;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .frame-item .remove-frame {
            position: absolute;
            top: 3px;
            right: 3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ff4757;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition);
            z-index: 3;
            padding: 0;
            font-weight: 700;
        }
        .frame-item:hover .remove-frame,
        .frame-item:focus-within .remove-frame {
            opacity: 1;
        }
        @media (hover: none) and (pointer: coarse) {
            .frame-item .remove-frame {
                opacity: 0.9;
                width: 26px;
                height: 26px;
                font-size: 15px;
            }
        }
        .frame-item .move-btn {
            position: absolute;
            bottom: 3px;
            width: 22px;
            height: 20px;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition);
            z-index: 3;
            padding: 0;
        }
        .frame-item .move-btn.move-left {
            left: 3px;
        }
        .frame-item .move-btn.move-right {
            right: 3px;
        }
        .frame-item:hover .move-btn,
        .frame-item:focus-within .move-btn {
            opacity: 1;
        }
        @media (hover: none) and (pointer: coarse) {
            .frame-item .move-btn {
                opacity: 0.75;
                width: 24px;
                height: 22px;
                font-size: 12px;
            }
        }
        .empty-frames {
            text-align: center;
            color: var(--text-lighter);
            font-size: 0.9rem;
            width: 100%;
            padding: 22px 0;
            font-style: italic;
        }

        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: center;
        }
        .setting-group {
            flex: 1 1 150px;
            min-width: 130px;
        }
        .setting-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 0.84rem;
            color: var(--text-light);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #a29bfe, #6c5ce7);
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #6c5ce7;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.12);
            box-shadow: var(--shadow);
        }
        .speed-value {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary-dark);
            min-width: 60px;
            text-align: center;
            background: #f5f3ff;
            padding: 7px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f1f3f6;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-light);
            white-space: nowrap;
        }

        .preview-area {
            text-align: center;
            position: relative;
            min-height: 190px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafbfd;
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px dashed #e0e3eb;
            transition: var(--transition);
        }
        .preview-area.has-frames {
            border: 2px solid #e0e3eb;
            background: #fff;
        }
        .preview-area canvas {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
            image-rendering: auto;
        }
        .preview-placeholder {
            color: var(--text-lighter);
            font-size: 0.95rem;
            padding: 32px;
        }
        .preview-placeholder .big-emoji {
            font-size: 54px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        .btn {
            flex: 1 1 auto;
            min-width: 110px;
            padding: 15px 24px;
            border-radius: var(--radius);
            border: none;
            font-weight: 700;
            font-size: 0.98rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-generate {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            box-shadow: 0 8px 28px rgba(108, 92, 231, 0.4);
            font-size: 1.05rem;
            flex: 2.5 1 190px;
        }
        .btn-generate:hover:not(:disabled) {
            box-shadow: 0 12px 36px rgba(108, 92, 231, 0.55);
            transform: translateY(-2px);
        }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(20%);
        }
        .btn-download {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: #fff;
            box-shadow: 0 8px 28px rgba(0, 184, 148, 0.35);
            flex: 1.8 1 140px;
        }
        .btn-download:hover:not(:disabled) {
            box-shadow: 0 12px 34px rgba(0, 184, 148, 0.5);
            transform: translateY(-2px);
        }
        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(20%);
        }
        .btn-reset {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
            flex: 1 1 110px;
        }
        .btn-reset:hover {
            background: #fff5f5;
            border-color: #ff4757;
            color: #ff4757;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.25);
        }
        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn.loading .spinner {
            display: inline-block;
        }
        .btn.loading .btn-text {
            display: none;
        }
        .btn.loading {
            pointer-events: none;
        }

        .progress-container {
            display: none;
            margin-top: 10px;
        }
        .progress-container.active {
            display: block;
        }
        .progress-bar-track {
            width: 100%;
            height: 10px;
            background: #e0e3eb;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.78rem;
            color: var(--text-light);
            text-align: center;
            margin-top: 6px;
            font-weight: 600;
        }

        .how-to-card {
            background: #fdfdff;
            border: 1px solid #e8ebf2;
        }
        .how-to-card .steps {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 12px;
        }
        .how-to-card .steps li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text);
            padding: 10px 14px;
            background: #fafbfd;
            border-radius: 12px;
            transition: var(--transition);
        }
        .how-to-card .steps li:hover {
            background: #f5f3ff;
        }
        .how-to-card .step-num {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .toast {
            position: fixed;
            bottom
